# BrowserStack Configuration Example
# ===================================
# Add this section to your serenity.conf file

browserstack {
  # Enable BrowserStack (set to true to use BrowserStack)
  enabled: false
  
  # BrowserStack credentials
  # Get your credentials from: https://www.browserstack.com/accounts/settings
  username: "your_username"
  accessKey: "your_access_key"
  
  # Build information
  # projectName is automatically taken from serenity.project.name in serenity.properties
  # buildName is not needed - BrowserStack auto-generates build names
  sessionName: "Test Session"
  
  # OS and browser configuration
  # Supported OS: Windows, OS X, iOS, Android
  os: "Windows"
  osVersion: "11"
  
  # Browser version
  # Use "latest" for latest version, or specify version like "120.0"
  browserVersion: "latest"
  
  # Timeout (seconds)
  timeout: "300"
  
  # Debug and logging
  debug: "true"
  networkLogs: "true"
  
  # Video recording
  video: "true"
}

# Browser configuration (remains the same)
playwright {
  browser {
    type: "chromium"  # chromium, firefox, webkit
    headless: false
  }
}

# ===================================
# Popular OS and Browser Combinations
# ===================================
#
# Windows:
# - Windows 10 / Chrome latest
# - Windows 11 / Edge latest
# - Windows 10 / Firefox latest
#
# macOS:
# - OS X Monterey / Chrome latest
# - OS X Ventura / Safari latest
#
# Mobile:
# - iOS 16 / Safari Mobile
# - Android 13 / Chrome Mobile
#
# ===================================
# Environment Variables Support
# ===================================
# You can also use environment variables:
# 
# browserstack {
#   username: ${?BROWSERSTACK_USERNAME}
#   accessKey: ${?BROWSERSTACK_ACCESS_KEY}
# }
#
# Then set environment variables:
# - export BROWSERSTACK_USERNAME="your_username"
# - export BROWSERSTACK_ACCESS_KEY="your_access_key"
