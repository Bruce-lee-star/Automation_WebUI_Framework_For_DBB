# ==================== Serenity BDD ====================
# Serenity \u9879\u76EE\u540D\u79F0
serenity.project.name=Serenity Playwright Demo

# ==================== \u6D4B\u8BD5\u6839\u76EE\u5F55 ====================
serenity.test.root=com.hsbc.cmb.hk.dbb.automation.tests

# ==================== \u7F16\u7801\u914D\u7F6E ====================
serenity.encoding=UTF-8
serenity.report.encoding=UTF-8

# ==================== \u622A\u56FE\u7B56\u7565 ====================
# \u622A\u56FE\u6A21\u5F0F - BEFORE_AND_AFTER_EACH_STEP, AFTER_EACH_STEP, FOR_FAILURES, DISABLED
# BEFORE_AND_AFTER_EACH_STEP - \u6BCF\u6B65\u524D\u540E\u622A\u56FE
# AFTER_EACH_STEP - \u4EC5\u6B65\u540E\u622A\u56FE
# FOR_FAILURES - \u4EC5\u5931\u8D25\u65F6\u622A\u56FE
serenity.screenshot.strategy=AFTER_EACH_STEP

# ==================== Playwright ====================
# \u622A\u56FE\u7B49\u5F85\u8D85\u65F6(\u6BEB\u79D2)
playwright.screenshot.wait.timeout=5000

# \u662F\u5426\u5168\u9875\u622A\u56FE
# true - \u5168\u9875\u622A\u56FE
# false - \u4E0D\u5168\u9875\u622A\u56FE
playwright.screenshot.fullpage=true

# ==================== Playwright SDK ====================
# \u662F\u5426\u81EA\u52A8\u4E0B\u8F7D\u6D4F\u89C8\u5668(\u8DF3\u8FC7\u4E0B\u8F7D\u4EE5\u4F7F\u7528\u672C\u5730\u6D4F\u89C8\u5668)
playwright.skip.browser.download=true

# ==================== \u89C6\u53E3\u914D\u7F6E ====================
# Viewport \u8BBE\u7F6E(\u50CF\u7D20)
playwright.context.viewport.width=1366
playwright.context.viewport.height=768

# ==================== \u89C6\u9891\u5F55\u5236 ====================
# \u662F\u5426\u542F\u7528\u89C6\u9891\u5F55\u5236
playwright.context.recordVideo.enabled=false
playwright.context.recordVideo.dir=target/videos

# Trace \u8BB0\u5F55
playwright.context.trace.enabled=false

# ==================== Playwright ====================
# \u9875\u9762\u52A0\u8F7D\u8D85\u65F6(\u6BEB\u79D2)
playwright.page.timeout=30000

# \u9875\u9762\u5BFC\u822A\u8D85\u65F6(\u6BEB\u79D2)
playwright.page.navigationTimeout=30000

# \u7B49\u5F85\u7A33\u5B9A\u5316\u8D85\u65F6(\u6BEB\u79D2)
playwright.stabilize.wait.timeout=30000

# \u5143\u7D20\u7B49\u5F85\u65F6\u95F4(\u6BEB\u79D2)
playwright.element.wait.timeout=15000

# \u8F6E\u8BE2\u95F4\u9694(\u6BEB\u79D2)
# \u7528\u4E8E\u5404\u79CD\u7B49\u5F85\u65B9\u6CD5\u7684\u8F6E\u8BE2\u68C0\u67E5\u95F4\u9694
playwright.polling.interval=500

# ==================== \u9875\u9762\u52A0\u8F7D\u72B6\u6001 ====================
# \u9875\u9762\u52A0\u8F7D\u72B6\u6001 - LOAD, DOMCONTENTLOADED, NETWORKIDLE
# LOAD - \u5B8C\u5168\u52A0\u8F7D
# DOMCONTENTLOADED - DOM\u5185\u5BB9\u52A0\u8F7D
# NETWORKIDLE - \u7F51\u7EDC\u7A7A\u95F2
playwright.page.load.state=DOMCONTENTLOADED

# ==================== \u529F\u80FD\u76EE\u5F55 ====================
# \u529F\u80FD\u76EE\u5F55
serenity.features.root=src/test/resources/features
serenity.requirements.base=src/test/resources/features

# ==================== \u6D4F\u89C8\u5668\u91CD\u542F ====================
# feature - \u6BCF\u4E2Afeature\u91CD\u542F\u6D4F\u89C8\u5668\uFF08\u540C\u4E00\u4E2AFeature\u5185\u590D\u7528\u6D4F\u89C8\u5668\uFF0C\u652F\u6301\u7F13\u5B58\u767B\u5F55\uFF09
# scenario - \u6BCF\u4E2Ascenario\u91CD\u542F\u6D4F\u89C8\u5668
serenity.playwright.restart.browser.for.each=scenario

# ==================== \u81EA\u5B9A\u4E49Context\u914D\u7F6E ====================
# ColorScheme - DARK, LIGHT, NO_PREFERENCE
playwright.custom.context.colorScheme=DARK

# UserAgent (\u81EA\u5B9A\u4E49\u7528\u6237\u4EE3\u7406\u5B57\u7B26\u4E32)
playwright.custom.context.userAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/60.0.0.0 Safari/537.36

# ViewportSize (\u89C6\u53E3\u5927\u5C0F,\u50CF\u7D20)
playwright.custom.context.viewport.width=600
playwright.custom.context.viewport.height=840

# ==================== Session \u914D\u7F6E ====================
# Session \u7BA1\u7406
# Session\u8D85\u65F6(\u5206\u949F)
playwright.no.login.session.timeout.minutes=20

# ==================== \u65E5\u5FD7\u8F93\u51FA ====================
# \u65E5\u5FD7\u8F93\u51FA\u6A21\u5F0F - QUIET, NORMAL, VERBOSE
# QUIET - \u53EA\u8F93\u51FAERROR
# NORMAL - \u8F93\u51FAWARN\u53CA\u4EE5\u4E0A
# VERBOSE - \u8F93\u51FAINFO\u53CA\u4EE5\u4E0A
serenity.logging=VERBOSE

# ==================== Cucumber \u4E25\u683C\u6A21\u5F0F ====================
# \u5C06 undefined/pending/ignored step \u89C6\u4E3A\u6D4B\u8BD5\u5931\u8D25\uFF08\u800C\u975E\u9759\u9ED8\u901A\u8FC7\uFF09
# \u4FEE\u590D\uFF1AIDEA \u4E2D Ignored Step \u663E\u793A\u4E3A pass \u7684\u95EE\u9898
cucumber.execution.strict=true

# \u662F\u5426\u542F\u7528\u6846\u67B6\u8BE6\u7EC6\u65E5\u5FD7(\u4EC5\u5728serenity.logging=VERBOSE
# true - \u542F\u7528\u8BE6\u7EC6\u65E5\u5FD7
# false - \u4E0D\u542F\u7528\u8BE6\u7EC6\u65E5\u5FD7
framework.verbose.logging=true

# ==================== \u62A5\u544A\u76EE\u5F55 ====================
# Serenity\u62A5\u544A\u76EE\u5F55\uFF08\u76F8\u5BF9\u8DEF\u5F84\uFF0C\u81EA\u52A8\u9002\u7528\u4E8E\u672C\u5730\u548C Jenkins\uFF09
# SummaryReportGenerator \u4F1A\u81EA\u52A8\u68C0\u6D4B\u73AF\u5883\u5E76\u8C03\u6574\u8DEF\u5F84\uFF0C\u65E0\u9700\u624B\u52A8\u914D\u7F6E
# \u672C\u5730\uFF1A\u4F7F\u7528 target/site/serenity
# Jenkins\uFF1A\u81EA\u52A8\u8F6C\u6362\u4E3A ${WORKSPACE}/target/site/serenity
serenity.outputDirectory=target/site/serenity

# ==================== \u62A5\u544A URL ====================
# Serenity\u62A5\u544A URL\uFF08\u53EF\u9009\uFF0CSummaryReportGenerator \u4F1A\u81EA\u52A8\u68C0\u6D4B\uFF09
# \u5728 Jenkins \u4E2D\uFF0CSummaryReportGenerator \u4F1A\u81EA\u52A8\u4ECE ${BUILD_URL} \u6784\u5EFA\u62A5\u544A URL
# \u672C\u5730\u73AF\u5883\uFF1A\u4F7F\u7528\u76F8\u5BF9\u94FE\u63A5 index.html
# \u53EF\u4EE5\u901A\u8FC7 -Dserenity.report.url \u81EA\u5B9A\u4E49 URL
#serenity.report.url=http://custom-url/reports

# ==================== Axe-core Accessibility \u914D\u7F6E ====================
# \u57FA\u4E8E Deque axe-core \u7684 WCAG \u65E0\u969C\u788D\u5408\u89C4\u6027\u81EA\u52A8\u626B\u63CF
# \u6846\u67B6\u81EA\u52A8\u96C6\u6210 AxeCoreListener\uFF0C\u6D4B\u8BD5\u5957\u4EF6\u7ED3\u675F\u81EA\u52A8\u751F\u6210\u62A5\u544A

# \u662F\u5426\u542F\u7528 axe-core \u626B\u63CF\uFF08\u5168\u5C40\u5F00\u5173\uFF09
axe.scan.enabled=true

# WCAG \u5408\u89C4\u6807\u51C6\u6807\u7B7E\uFF08\u9017\u53F7\u5206\u9694\uFF0C\u7559\u7A7A\u5219\u8FD0\u884C\u6240\u6709\u89C4\u5219\uFF09
# \u5E38\u7528\u503C\uFF1A
#   wcag2a    - WCAG 2.0 A \u7EA7\uFF08\u57FA\u7840\u65E0\u969C\u788D\uFF09
#   wcag2aa   - WCAG 2.0 AA \u7EA7\uFF08\u63A8\u8350\uFF09
#   wcag21aa  - WCAG 2.1 AA \u7EA7
#   wcag22aa  - WCAG 2.2 AA \u7EA7\uFF08\u6700\u65B0\uFF09
# \u793A\u4F8B: wcag2a,wcag2aa
axe.scan.tags=

# \u62A5\u544A\u8F93\u51FA\u76EE\u5F55\uFF08\u8FD0\u884C\u65F6\u751F\u6210\uFF0C\u53EF\u653E target/\uFF09
axe.scan.outputDir=target/accessibility-axe

serenity.requirements.types=capability,feature
serenity.console.colors=true

# ==================== \u62A5\u544A URL \u914D\u7F6E ====================
# Summary \u62A5\u544A\u57FA\u7840 URL\uFF08\u7528\u4E8E\u90AE\u4EF6\u4E2D\u6240\u6709\u94FE\u63A5\uFF1AView Full Report\u3001Download ZIP/CSV\u3001Scenario \u94FE\u63A5\uFF09
# \u652F\u6301\u73AF\u5883\u53D8\u91CF\u5360\u4F4D\u7B26
#
# \u793A\u4F8B\uFF1A
#   serenity.report.url=${JENKINS_URL}job/${JOB_NAME}/${BUILD_NUMBER}/Serenity_20Summary_20Report/
#   \u89E3\u6790\u540E: http://jenkins.cli:8888/job/Playwright/47/Serenity_20Summary_20Report/
#
# \u26A0\uFE0F View full report \u6309\u94AE\u4F1A\u94FE\u63A5\u5230\u8BE5 URL \u4E0B\u7684 serenity-summary.html\uFF08\u5373\u672C\u9875\u9762\u81EA\u8EAB\uFF09
serenity.report.url=${JENKINS_URL}job/${JOB_NAME}/${BUILD_NUMBER}/Serenity_20Summary_20Report/

# ==================== \u9519\u8BEF\u7C7B\u578B\u5206\u7C7B\u914D\u7F6E ====================
# \u7528\u4E8E Summary Report \u9519\u8BEF\u5206\u7C7B\u56FE\uFF08JSON \u683C\u5F0F\uFF09
#
# \u683C\u5F0F\uFF08\u5355\u884C JSON\uFF09\uFF1A
#   report.error.types=[{"label":"\u663E\u793A\u540D","keywords":["\u5173\u952E\u5B571","\u5173\u952E\u5B572","..."]}, ...]
#
# \u5339\u914D\u903B\u8F91\uFF1AerrorMessage \u662F\u5426\u5305\u542B\u4EFB\u4E00\u5173\u952E\u5B57\uFF08\u5927\u5C0F\u5199\u4E0D\u654F\u611F\uFF0C\u7EAF\u5B57\u7B26\u4E32 contains\uFF09
# \u7CFB\u7EDF\u6309\u987A\u5E8F\u4F9D\u6B21\u5224\u65AD\uFF1A\u7528\u6237\u914D\u7F6E\u4F18\u5148 \u2192 \u5185\u7F6E\u9ED8\u8BA4\u515C\u5E95 \u2192 \u90FD\u672A\u5305\u542B\u5F52\u5165 "Other"
#
# \u793A\u4F8B\uFF1A
#   report.error.types=[{"label":"Api Issue","keywords":["ApiException","HTTP 500","502 Bad Gateway","4xx Client Error"]}, {"label":"Timeout Error","keywords":["TimeoutException","timed out","timeout"]}]
#
# \u4E0D\u914D\u7F6E\u6B64\u5C5E\u6027\u5219\u4EC5\u4F7F\u7528\u5185\u7F6E\u9ED8\u8BA4\u5206\u7C7B\uFF0812\u7C7B\uFF09
# \u914D\u7F6E\u4E86\u4F1A\u8FFD\u52A0\u5728\u9ED8\u8BA4\u89C4\u5219\u4E4B\u524D\uFF08\u7528\u6237\u914D\u7F6E\u4F18\u5148\u5339\u914D\uFF09

report.error.types=[{"label":"Environment Issue","keywords":["Connection refused","database unavailable","config missing","service unreachable"]}, {"label":"Api Issue","keywords":["ApiException","API failed","HTTP 500","502 Bad Gateway","503 Service Unavailable","4xx Client Error","5xx Server Error","interface error"]}, {"label":"Navigation Failed","keywords":["NavigationTimeout","page not loaded","net::ERR_","loading failed"]}, {"label":"Element Not Found","keywords":["ElementNotFound","element not found","locator not found","selector not found"]}, {"label":"Assertion Failed","keywords":["AssertionError","expected but was","mismatch"]}, {"label":"Timeout Error","keywords":["TimeoutException","timed out","timeout"]}]

# ==================== Playwright \u539F\u751F\u5FEB\u7167\u6D4B\u8BD5\u914D\u7F6E ====================

# \u662F\u5426\u542F\u7528\u539F\u751F\u5FEB\u7167\u6D4B\u8BD5\uFF08\u5168\u5C40\u5F00\u5173\uFF09
native.snapshot.enabled=true

# \u89C6\u89C9\u5FEB\u7167\u57FA\u7EBF\u76EE\u5F55\uFF08\u7EB3\u5165 Git \u7248\u672C\u63A7\u5236\uFF09
native.snapshot.visual.dir=src/test/resources/snapshots/native/visual

# ARIA \u5FEB\u7167\u57FA\u7EBF\u76EE\u5F55\uFF08\u7EB3\u5165 Git \u7248\u672C\u63A7\u5236\uFF0C\u4E00\u5957\u57FA\u7EBF\u8DE8\u5E73\u53F0\uFF09
native.snapshot.aria.dir=src/test/resources/snapshots/native/aria

# \u89C6\u89C9\u5FEB\u7167\u6700\u5927\u5DEE\u5F02\u50CF\u7D20\u6570\uFF08\u8D85\u8FC7\u6B64\u503C\u5224\u5B9A\u4E3A\u5931\u8D25\uFF09
native.snapshot.visual.maxDiffPixels=100

# \u89C6\u89C9\u5FEB\u7167\u6700\u5927\u5DEE\u5F02\u50CF\u7D20\u6BD4\u4F8B (0.01 = 1%)
native.snapshot.visual.maxDiffPixelRatio=0.01

# \u9759\u9ED8\u6A21\u5F0F\uFF08\u51CF\u5C11\u65E5\u5FD7\u8F93\u51FA\uFF09
native.snapshot.silent=false

# ==================== BrowserStack \u4E91\u6D4B\u8BD5\u914D\u7F6E ====================
# \u901A\u8FC7 CDP (Chrome DevTools Protocol) \u8FDE\u63A5 BrowserStack \u4E91\u7AEF\u6D4F\u89C8\u5668
# \u542F\u7528\u540E\u65E0\u9700\u4FEE\u6539\u6D4B\u8BD5\u4EE3\u7801\uFF0C\u6846\u67B6\u81EA\u52A8\u5207\u6362\u5230\u8FDC\u7A0B\u6D4F\u89C8\u5668
# \u8BE6\u7EC6\u6587\u6863\uFF1ABROWSERSTACK_INTEGRATION.md

# \u662F\u5426\u542F\u7528 BrowserStack \u4E91\u6D4B\u8BD5\uFF08\u5168\u5C40\u5F00\u5173\uFF09
browserstack.enabled=false

# BrowserStack \u51ED\u8BC1\uFF08\u63A8\u8350\u4F7F\u7528\u73AF\u5883\u53D8\u91CF BROWSERSTACK_USERNAME / BROWSERSTACK_ACCESS_KEY\uFF09
browserstack.username=
browserstack.accessKey=

# Dashboard \u4F1A\u8BDD\u540D\u79F0\uFF08\u63A8\u8350\u901A\u8FC7 -Dbrowserstack.sessionName \u6309\u573A\u666F\u8BBE\u7F6E\uFF09
browserstack.sessionName=

# \u64CD\u4F5C\u7CFB\u7EDF\u4E0E\u7248\u672C
browserstack.os=Windows
browserstack.osVersion=11

# \u6D4F\u89C8\u5668\u7248\u672C\uFF08latest \u6216\u6307\u5B9A\u7248\u672C\u5982 120.0\uFF09
browserstack.browserVersion=latest

# \u8FDE\u63A5\u8D85\u65F6\uFF08\u79D2\uFF09
browserstack.timeout=300

# \u8C03\u8BD5\u6A21\u5F0F\uFF08true=\u6B65\u9AA4\u7EA7\u622A\u56FE\uFF0C\u4EC5\u9650\u8C03\u8BD5\u4F7F\u7528\uFF09
browserstack.debug=true

# \u7F51\u7EDC\u65E5\u5FD7\uFF08true=\u6355\u83B7 HTTP \u8BF7\u6C42/\u54CD\u5E94\uFF09
browserstack.networkLogs=true

# \u89C6\u9891\u5F55\u5236\uFF08true=\u5F55\u5236\u6D4B\u8BD5\u8FC7\u7A0B\uFF09
browserstack.video=true

