# ==================== Serenity BDD ====================
# Serenity 项目名称
serenity.project.name=Serenity Playwright Demo

# ==================== 测试根目录 ====================
serenity.test.root=com.hsbc.cmb.hk.dbb.automation.tests

# ==================== 编码配置 ====================
serenity.encoding=UTF-8
serenity.report.encoding=UTF-8

# ==================== 截图策略 ====================
# 截图模式 - BEFORE_AND_AFTER_EACH_STEP, AFTER_EACH_STEP, FOR_FAILURES, DISABLED
# BEFORE_AND_AFTER_EACH_STEP - 每步前后截图
# AFTER_EACH_STEP - 仅步后截图
# FOR_FAILURES - 仅失败时截图
serenity.screenshot.strategy=AFTER_EACH_STEP

# ==================== Playwright ====================
# 截图等待超时(毫秒)
playwright.screenshot.wait.timeout=5000

# 是否全页截图
# true - 全页截图
# false - 不全页截图
playwright.screenshot.fullpage=true

# ==================== Playwright SDK ====================
# 是否自动下载浏览器(跳过下载以使用本地浏览器)
playwright.skip.browser.download=true

# ==================== 视口配置 ====================
# Viewport 设置(像素)
playwright.context.viewport.width=1366
playwright.context.viewport.height=768

# ==================== 视频录制 ====================
# 是否启用视频录制
playwright.context.recordVideo.enabled=false
playwright.context.recordVideo.dir=target/videos

# Trace 记录
playwright.context.trace.enabled=false

# ==================== Playwright ====================
# 页面加载超时(毫秒)
playwright.page.timeout=30000

# 页面导航超时(毫秒)
playwright.page.navigationTimeout=30000

# 等待稳定化超时(毫秒)
playwright.stabilize.wait.timeout=30000

# 元素等待时间(毫秒)
playwright.element.wait.timeout=15000

# 轮询间隔(毫秒)
# 用于各种等待方法的轮询检查间隔
playwright.polling.interval=500

# ==================== 页面加载状态 ====================
# 页面加载状态 - LOAD, DOMCONTENTLOADED, NETWORKIDLE
# LOAD - 完全加载
# DOMCONTENTLOADED - DOM内容加载
# NETWORKIDLE - 网络空闲
playwright.page.load.state=DOMCONTENTLOADED

# ==================== 功能目录 ====================
# 功能目录
serenity.features.root=src/test/resources/features
serenity.requirements.base=src/test/resources/features

# ==================== 浏览器重启 ====================
# feature - 每个feature重启浏览器（同一个Feature内复用浏览器，支持缓存登录）
# scenario - 每个scenario重启浏览器
serenity.playwright.restart.browser.for.each=scenario

# ==================== 自定义Context配置 ====================
# ColorScheme - DARK, LIGHT, NO_PREFERENCE
playwright.custom.context.colorScheme=DARK

# UserAgent (自定义用户代理字符串)
playwright.custom.context.userAgent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/60.0.0.0 Safari/537.36

# ViewportSize (视口大小,像素)
playwright.custom.context.viewport.width=600
playwright.custom.context.viewport.height=840

# ==================== Session 配置 ====================
# Session 管理
# Session超时(分钟)
playwright.no.login.session.timeout.minutes=20

# ==================== 日志输出 ====================
# 日志输出模式 - QUIET, NORMAL, VERBOSE
# QUIET - 只输出ERROR
# NORMAL - 输出WARN及以上
# VERBOSE - 输出INFO及以上
serenity.logging=VERBOSE

# 是否启用框架详细日志(仅在serenity.logging=VERBOSE时生效)
# true - 启用详细日志
# false - 不启用详细日志
framework.verbose.logging=false

# ==================== 报告目录 ====================
# Serenity报告目录（相对路径，自动适用于本地和 Jenkins）
# SummaryReportGenerator 会自动检测环境并调整路径，无需手动配置
# 本地：使用 target/site/serenity
# Jenkins：自动转换为 ${WORKSPACE}/target/site/serenity
serenity.outputDirectory=target/site/serenity

# ==================== 报告 URL ====================
# Serenity报告 URL（可选，SummaryReportGenerator 会自动检测）
# 在 Jenkins 中，SummaryReportGenerator 会自动从 ${BUILD_URL} 构建报告 URL
# 本地环境：使用相对链接 index.html
# 可以通过 -Dserenity.report.url 自定义 URL
#serenity.report.url=http://custom-url/reports

# ==================== Axe-core Accessibility 配置 ====================
# 基于 Deque axe-core 的 WCAG 无障碍合规性自动扫描
# 框架自动集成 AxeCoreListener，测试套件结束自动生成报告

# 是否启用 axe-core 扫描（全局开关）
axe.scan.enabled=true

# WCAG 合规标准标签（逗号分隔，留空则运行所有规则）
# 常用值：
#   wcag2a    - WCAG 2.0 A 级（基础无障碍）
#   wcag2aa   - WCAG 2.0 AA 级（推荐）
#   wcag21aa  - WCAG 2.1 AA 级
#   wcag22aa  - WCAG 2.2 AA 级（最新）
# 示例: wcag2a,wcag2aa
axe.scan.tags=

# 报告输出目录（运行时生成，可放 target/）
axe.scan.outputDir=target/accessibility-axe

serenity.requirements.types=capability,feature
serenity.console.colors=true

# ==================== 报告 URL 配置 ====================
# Summary 报告基础 URL（用于邮件中所有链接：View Full Report、Download ZIP/CSV、Scenario 链接）
# 支持环境变量占位符
#
# 示例：
#   serenity.report.url=${JENKINS_URL}job/${JOB_NAME}/${BUILD_NUMBER}/Serenity_20Summary_20Report/
#   解析后: http://jenkins.cli:8888/job/Playwright/47/Serenity_20Summary_20Report/
#
# ⚠️ View full report 按钮会链接到该 URL 下的 serenity-summary.html（即本页面自身）
serenity.report.url=${JENKINS_URL}job/${JOB_NAME}/${BUILD_NUMBER}/Serenity_20Summary_20Report/

# ==================== 错误类型分类配置 ====================
# 用于 Summary Report 错误分类图（JSON 格式）
#
# 格式（单行 JSON）：
#   report.error.types=[{"label":"显示名","keywords":["关键字1","关键字2","..."]}, ...]
#
# 匹配逻辑：errorMessage 是否包含任一关键字（大小写不敏感，纯字符串 contains）
# 系统按顺序依次判断：用户配置优先 → 内置默认兜底 → 都未包含归入 "Other"
#
# 示例：
#   report.error.types=[{"label":"Api Issue","keywords":["ApiException","HTTP 500","502 Bad Gateway","4xx Client Error"]}, {"label":"Timeout Error","keywords":["TimeoutException","timed out","timeout"]}]
#
# 不配置此属性则仅使用内置默认分类（12类）
# 配置了会追加在默认规则之前（用户配置优先匹配）

report.error.types=[{"label":"Environment Issue","keywords":["Connection refused","database unavailable","config missing","service unreachable"]}, {"label":"Api Issue","keywords":["ApiException","API failed","HTTP 500","502 Bad Gateway","503 Service Unavailable","4xx Client Error","5xx Server Error","interface error"]}, {"label":"Navigation Failed","keywords":["NavigationTimeout","page not loaded","net::ERR_","loading failed"]}, {"label":"Element Not Found","keywords":["ElementNotFound","element not found","locator not found","selector not found"]}, {"label":"Assertion Failed","keywords":["AssertionError","expected but was","mismatch"]}, {"label":"Timeout Error","keywords":["TimeoutException","timed out","timeout"]}]

# ==================== Playwright 原生快照测试配置 ====================

# 是否启用原生快照测试（全局开关）
native.snapshot.enabled=true

# 视觉快照基线目录（纳入 Git 版本控制）
native.snapshot.visual.dir=src/test/resources/snapshots/native/visual

# ARIA 快照基线目录（纳入 Git 版本控制，一套基线跨平台）
native.snapshot.aria.dir=src/test/resources/snapshots/native/aria

# 视觉快照最大差异像素数（超过此值判定为失败）
native.snapshot.visual.maxDiffPixels=100

# 视觉快照最大差异像素比例 (0.01 = 1%)
native.snapshot.visual.maxDiffPixelRatio=0.01

# 静默模式（减少日志输出）
native.snapshot.silent=false

# ==================== BrowserStack 云测试配置 ====================
# 通过 CDP (Chrome DevTools Protocol) 连接 BrowserStack 云端浏览器
# 启用后无需修改测试代码，框架自动切换到远程浏览器
# 详细文档：BROWSERSTACK_INTEGRATION.md

# 是否启用 BrowserStack 云测试（全局开关）
browserstack.enabled=false

# BrowserStack 凭证（推荐使用环境变量 BROWSERSTACK_USERNAME / BROWSERSTACK_ACCESS_KEY）
browserstack.username=
browserstack.accessKey=

# Dashboard 会话名称（推荐通过 -Dbrowserstack.sessionName 按场景设置）
browserstack.sessionName=

# 操作系统与版本
browserstack.os=Windows
browserstack.osVersion=11

# 浏览器版本（latest 或指定版本如 120.0）
browserstack.browserVersion=latest

# 连接超时（秒）
browserstack.timeout=300

# 调试模式（true=步骤级截图，仅限调试使用）
browserstack.debug=true

# 网络日志（true=捕获 HTTP 请求/响应）
browserstack.networkLogs=true

# 视频录制（true=录制测试过程）
browserstack.video=true

