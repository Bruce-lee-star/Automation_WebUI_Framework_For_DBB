# Serenity Configuration for Playwright Integration
# ================================================
# This file contains Playwright browser configuration and session settings.
# All other configurations are managed in serenity.properties
#
# Purpose: This file manages which browser to instantiate and browser launch arguments.
# Framework settings, reporting, test execution, and retry logic are in serenity.properties.
#
# Browser Download Logic:
# - Firefox: ALWAYS downloads Playwright version (required for Juggler protocol)
# - WebKit: ALWAYS downloads Playwright version (required)
# - Chrome: Downloads if no executablePath or channel specified
# - Edge: Downloads if no executablePath or channel specified
# - Chromium: Downloads if no channel specified
#
# To use local Chrome/Edge:
# - Set channel: "chrome" or "msedge"
# - Optionally set executablePath for specific path
# - The framework will automatically skip download

# Session Configuration is managed in serenity.properties:
# playwright.no.login.session.timeout.minutes=5

# Playwright Browser Configuration
playwright {
  browser {
    # Browser type (chromium, firefox, webkit)
    type: "chromium"

    # Headless mode (true or false)
    headless: false

    # Browser channel (optional, only for Chromium-based browsers)
    # Supported channels:
    #   - "chrome"          : Local Chrome browser
    #   - "chrome-beta"     : Chrome Beta version
    #   - "chrome-dev"      : Chrome Dev version
    #   - "chrome-canary"   : Chrome Canary version
    #   - "msedge"          : Local Edge browser
    #   - "msedge-beta"     : Edge Beta version
    #   - "msedge-dev"      : Edge Dev version
    #   - "msedge-canary"   : Edge Canary version
    # Note: channel only works for Chromium-based browsers (Chrome, Edge)
    # Firefox and WebKit always use Playwright's version
    channel: "chrome"

    # Firefox browser configuration
    # Note: Firefox MUST use Playwright's compiled version (with Juggler protocol)
    # Local Firefox installations are NOT supported
    firefox {
      # Firefox launch arguments (comma-separated)
      # Note: Firefox doesn't support Chromium-specific args like --disable-blink-features
      args: ""
    }

    # WebKit browser configuration
    # Note: WebKit always uses Playwright's version
    webkit {
      # WebKit launch arguments (comma-separated)
      args: ""
    }

    # Chrome browser configuration
    # Supports both Playwright's Chrome and local Chrome
    chrome {
      # Chrome executable path (optional)
      # Leave empty to use channel setting or Playwright's Chrome
      # Windows: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
      # macOS: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
      # Linux: "/usr/bin/google-chrome"
      executablePath: ""
      
      # Chrome launch arguments (comma-separated)
      args: "--disable-blink-features=AutomationControlled,--disable-pinch,--disable-web-security"
    }

    # Edge browser configuration
    # Supports both Playwright's Edge and local Edge
    edge {
      # Edge executable path (optional)
      # Leave empty to use channel setting or Playwright's Edge
      # Windows: "C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe"
      # macOS: "/Applications/Microsoft Edge.app/Contents/MacOS/Microsoft Edge"
      # Linux: "/usr/bin/microsoft-edge"
      executablePath: ""
      
      # Edge launch arguments (comma-separated)
      args: "--disable-blink-features=AutomationControlled,--disable-pinch,--disable-web-security"
    }

    # Chromium browser configuration (generic, used when channel is not set)
    chromium {
      # Chromium launch arguments (comma-separated)
      args: "--disable-blink-features=AutomationControlled,--disable-pinch,--disable-web-security"
    }

    # Slow motion delay in milliseconds (for debugging)
    slowMo: 100

    # Browser timeout in milliseconds
    timeout: 15000

    # Downloads path
    downloadsPath: "target/downloads"
  }
}

